name: SkillForge Web Preview

# Builds the Flutter web app and publishes a clickable preview to GitHub Pages.
# - On pull_request: build only (verifies the web build compiles) + uploads the
#   built site as a downloadable artifact.
# - On push to the working branch / main: build AND deploy to GitHub Pages, so
#   the live preview URL updates automatically.
#
# One-time setup (repo owner): Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". After that the preview is served at:
#   https://jaimeybarra17-oss.github.io/claude-code/
on:
  push:
    branches:
      - main
      - "claude/skillforge-**"
    paths:
      - "skillforge/app/**"
      - ".github/workflows/skillforge-web-preview.yml"
  pull_request:
    paths:
      - "skillforge/app/**"
      - ".github/workflows/skillforge-web-preview.yml"
  workflow_dispatch:

# Pages serves a single site; cancel superseded deploys rather than queue them.
concurrency:
  group: skillforge-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skillforge/app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      # Placeholder config is enough to render the UI; point at a real Supabase
      # project here (or via repo secrets) to make the preview fully live.
      - run: cp .env.example .env
      - run: flutter pub get
      # base-href must match the Pages project subpath (/claude-code/).
      - run: flutter build web --release --base-href /claude-code/
      - name: Upload downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillforge-web
          path: skillforge/app/build/web
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: skillforge/app/build/web

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy for trusted in-repo events (push / manual), never fork PRs.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
