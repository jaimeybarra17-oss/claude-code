name: Deploy Web App
on:
  push:
    branches: [main, SkillForge]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skillforge/app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: cp .env.example .env
      - run: flutter pub get
      - run: flutter build web --base-href "/claude-code/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: skillforge/app/build/web
      - uses: actions/deploy-pages@v4
