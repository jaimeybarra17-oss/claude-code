name: skillforge
description: SkillForge — the Duolingo for high-income careers.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Backend
  supabase_flutter: ^2.5.0
  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  # Config & utilities
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  # UI / motion / charts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  confetti: ^0.7.0
  # Secure token storage
  flutter_secure_storage: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
